apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: flagger-prometheus-metrics
  namespace: istio-system
  labels:
    release: istio # This ensures your Prometheus operator picks it up
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: flagger
  endpoints:
  - port: prometheus
    interval: 15s