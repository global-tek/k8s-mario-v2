# gitops/base/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: mario-base

resources:
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      app: mario
      managed-by: argocd

images:
  - name: mario-game
    newName: 145689194429.dkr.ecr.us-west-2.amazonaws.com/mario
    newTag: latest  # Will be overridden by environment

configMapGenerator:
  - name: mario-config
    literals:
      - APP_NAME=mario
      - ENVIRONMENT=base